# stormd supervisor config for cloudid container
# stormd is PID 1, cloudid is a supervised child process

[general]
name = "cloudid"
log_dir = "/var/stormd/logs"

[api]
bind = "0.0.0.0:9080"

[ssh]
enabled = true
bind = "0.0.0.0:22"
host_key = "/var/stormd/host_key"
password = "stormd"

[stormlog.terminal]
rows = 50
cols = 200
scrollback = 10000

[[process]]
name = "cloudid"
command = "/cloudid"
args = ["serve", "--config", "/etc/cloudid/config.toml"]
on_failure = "restart"
restart_delay_secs = 5
max_restarts = 100
restart_window_secs = 3600
