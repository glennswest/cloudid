[server]
metadata_addr = "0.0.0.0:8090"

[amo]
nats_url = "nats://nats.gt.lo:4222"

[mkube]
url = "http://192.168.200.2:8082"

[metadata]
domain_suffix = ".g10.lo"
availability_zone = "gt"
cache_rebuild_interval_secs = 30
dhcp_sources = ["http://192.168.10.252:8080/api/v1/leases"]

# RouterOS IMDS DST-NAT rule management (optional)
# If configured, cloudid ensures 169.254.169.254:80 -> cloudid on the router.
[routeros]
rest_url = "http://192.168.200.1/rest"
user = "mkube"
password = "mkube-rest"
to_address = "192.168.200.20"

# Static identity -- works without AMO NATS
[[static_users]]
name = "gwest"
uid = 1001
gid = 1001
shell = "/bin/bash"
groups = ["wheel"]
ssh_key_files = ["/etc/cloudid/gwest.pub"]

# Grant access to all BMH hosts as root and core
[[static_host_access]]
ssh_users = ["root", "core"]
hosts = ["*"]
users = ["gwest"]
sudo = true
